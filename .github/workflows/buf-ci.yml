name: Buf CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - development
      - master
    tags:
      - '*'
  release:
    types:
      - published

jobs:
  buf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Buf Action
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff #v1.4.0
        with:
          breaking: false
          token: ${{ secrets.BUF_TOKEN }}
